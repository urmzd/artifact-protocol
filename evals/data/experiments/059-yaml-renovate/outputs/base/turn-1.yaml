extends:
  - config:recommended
  - group:monorepos
  - group:recommended
  - helpers:pinGitHubActionDigests

labels:
  - dependencies

schedule:
  - at 09:00 on Monday

automerge: true

packageRules:
  - matchUpdateTypes:
      - minor
      - patch
      - pin
      - digest
    automerge: true
    platformAutomerge: true

  - matchPackagePatterns:
      - ^@types/
    groupName: "@types packages"
    groupSlug: types
    automerge: true

  - matchPackagePatterns:
      - ^typescript$
      - ^ts-node$
    groupName: typescript-ecosystem

  - matchPackageNames:
      - eslint
      - prettier
    groupName: lint-format-tools

ignoreDeps:
  - typescript

vulnerabilityAlerts:
  enabled: true
  labels:
    - security

rebaseWhen: auto